[MODEL]
# 模型名称（根据实际服务配置）
model_name = qwen/qwen3.5-27b
# OpenAI 兼容 API 服务地址
# 示例：
#   LM Studio: http://127.0.0.1:1234/v1
#   ollama: http://127.0.0.1:8000/v1
api_base_url = http://192.168.13.6:1234/v1
api_key = ollama
# 最大生成 token 数
max_new_tokens = 30000
temperature = 0.3
top_p = 0.9

[VIDEO]
# 默认导出帧率设置，可在打标器内修改
default_export_fps = 16
# 导出路径（每次需手动设置）
export_path = 

[UI]
# 默认窗口大小
window_width = 1800
window_height = 1000

[PROCESSING]
# 预处理帧的目标最长边
target_max_edge = 720
# AI 处理时采样的最大帧数
max_sample_frames = 30
# 目标帧率
target_frame_rate = 16
# 自动分段时长（秒）
segment_duration = 5
# 发送给 AI 的图像最大边长
image_max_size = 720

[PROMPTS]
# AI 提示词已从 config.ini 移至同目录下的 video_prompt.txt，在该文件中编辑即可
video_prompt =

[FILTER_WORDS]
# 当 AI 生成的提示词包含以下词汇时会重新生成，多个词汇用逗号分隔
words = 不符合，公序良俗，低俗，违规，道德，无法提供，blurry,low resolution,watermark,signature,text,logo,username,I cannot,
