[MODEL]
# Qwen-VL模型路径
qwen_vl_model_path = J:\models\LLM\Qwen-VL\Qwen3-VL-8B-Instruct
# 生成文本的最大token数
max_new_tokens = 300000
# 重试时生成文本的最大token数
retry_max_new_tokens = 300000
# 生成时的温度参数
temperature = 0.3
# 生成时的top-p参数
top_p = 0.9
# 模型精度设置 (可选: fp32, fp16, bf16)
torch_dtype = bf16

[VIDEO]
# 默认导出帧率设置，可在打标器内修改
default_export_fps = original
#导出路径
export_path = E:\Videos\抖音短视频\视频\1-19数据集
[UI]
# 默认窗口大小
window_width = 1800
window_height = 1000


[PROCESSING]
# 预处理帧的目标高度 (用于resize_to_720p函数)
target_frame_height = 720
max_size = (720,720)
# AI处理时采样的最大帧数
max_sample_frames = 15
# 目标帧率
target_frame_rate = 16
# 自动分段时长（秒）
segment_duration = 5
# 导出文件名最大长度
max_filename_length = 50

[VLLM]
api_base_url = http://127.0.0.1:8000/v1
api_key = EMPTY
model_name = /models/Qwen3-VL-8B-Instruct
max_tokens = 300000
temperature = 0.3
top_p = 0.9

[OLLAMA2]
api_base_url = http://127.0.0.1:1234/v1
api_key = ollama
model_name = qwen/qwen3.5-35b-a3b
max_tokens = 16384
temperature = 0.3
top_p = 0.9
[OLLAMA]
api_base_url = http://127.0.0.1:1234/v1
api_key = ollama
model_name = qwen/qwen3.5-9b
max_tokens = 16384
temperature = 1
top_p = 0.95
[PROMPTS]
# 视频处理提示词
video_prompt = 详细描述视频内容。按照逗号分隔的中文提示词格式输出当前女角色的着装造型,姿势动作。

[FILTER]
# 过滤关键词，用逗号分隔
keywords = 隐私部位,私密部位,生殖器,下体,

[FILTER_WORDS]
# 当AI生成的提示词包含以下词汇时会重新生成，多个词汇用逗号分隔
words = 私处,隐私部位,私密部位,不符合,公序良俗,低俗,违规,道德,无法提供,blurry,low resolution,watermark,signature,text,logo,username,I cannot,