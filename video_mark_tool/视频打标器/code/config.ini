[MODEL]
# 模型生成参数配置
# 注：API 调用相关配置在 [LLM] 段中
max_new_tokens = 30000
# 重试时生成文本的最大 token 数
retry_max_new_tokens = 30000
# 生成时的温度参数
temperature = 0.3
# 生成时的 top-p 参数
top_p = 0.9

[VIDEO]
# 默认导出帧率设置，可在打标器内修改
default_export_fps = 16
# 导出路径（每次需手动设置）
export_path = 

[UI]
# 默认窗口大小
window_width = 1800
window_height = 1000

[PROCESSING]
# 预处理帧的目标高度 (用于 resize_to_720p 函数)
target_frame_height = 720
max_size = (720,720)
# AI 处理时采样的最大帧数
max_sample_frames = 15
# 目标帧率
target_frame_rate = 16
# 自动分段时长（秒）
segment_duration = 5
# 导出文件名最大长度
max_filename_length = 50

[LLM]
# OpenAI 兼容 API 服务地址
# 示例：
#   LM Studio: http://127.0.0.1:1234/v1
#   ollama: http://127.0.0.1:8000/v1
api_base_url = http://192.168.10.30:1234/v1
api_key = ollama
# 模型名称（根据实际服务配置）
#model_name = qwen/qwen3.6-27b
model_name = qwen/qwen3.6-35b-a3b
# 最大生成 token 数
max_tokens = 60000
# 温度参数（控制随机性）
temperature = 1
# top-p 参数（控制多样性）
top_p = 0.95

[PROMPTS]
# 视频处理提示词
video_prompt = 详细描述视频内容。内容分为:环境,角色服装和造型,然后是几个镜头的类型+人物体态动作,输出内容格式严格参考下面的例子.例如:场景与环境，红色皮质沙发，金色雕花装饰，周围散落红色绿色花纹礼物盒，黄色星星装饰，花纹地毯，背景紫色幕布、书架，节日氛围，华丽复古室内，人物装扮，兔耳发饰（黑白蕾丝），白色蕾丝露肩连衣裙（长袖、黑色领结、蕾丝装饰），黑色丝袜，黑色高跟鞋，白色蕾丝手套，镜头从人物侧身坐姿腿部特写开始，旋转运镜,镜头上移近景全身侧坐，单腿屈膝，单手摸领结，切镜腿部特写，镜头上移近景全身正面跪坐，双手按在双腿之间

[FILTER]
# 过滤关键词，用逗号分隔
keywords = 不符合，公序良俗，低俗，违规，道德，无法提供，blurry,low resolution,watermark,signature,text,logo,username,I cannot,

[FILTER_WORDS]
# 当 AI 生成的提示词包含以下词汇时会重新生成，多个词汇用逗号分隔
words = 不符合，公序良俗，低俗，违规，道德，无法提供，blurry,low resolution,watermark,signature,text,logo,username,I cannot,
