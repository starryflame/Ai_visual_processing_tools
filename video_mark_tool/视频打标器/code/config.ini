[MODEL]
# 模型生成参数配置
# 注：API 调用相关配置在 [LLM] 段中
max_new_tokens = 300000
# 重试时生成文本的最大 token 数
retry_max_new_tokens = 300000
# 生成时的温度参数
temperature = 0.3
# 生成时的 top-p 参数
top_p = 0.9
# 模型精度设置 (可选：fp32, fp16, bf16)
torch_dtype = bf16

[VIDEO]
# 默认导出帧率设置，可在打标器内修改
default_export_fps = original
# 导出路径
export_path = E:\Videos\抖音短视频\视频\1-19 数据集

[UI]
# 默认窗口大小
window_width = 1800
window_height = 1000

[PROCESSING]
# 预处理帧的目标高度 (用于 resize_to_720p 函数)
target_frame_height = 720
max_size = (720,720)
# AI 处理时采样的最大帧数
max_sample_frames = 15
# 目标帧率
target_frame_rate = 16
# 自动分段时长（秒）
segment_duration = 5
# 导出文件名最大长度
max_filename_length = 50

[LLM]
# OpenAI 兼容 API 服务地址
# 示例：
#   LM Studio: http://127.0.0.1:1234/v1
#   vLLM: http://127.0.0.1:8000/v1
api_base_url = http://127.0.0.1:1234/v1
api_key = ollama
# 模型名称（根据实际服务配置）
model_name = qwen/qwen3.5-9b
# 最大生成 token 数
max_tokens = 16384
# 温度参数（控制随机性）
temperature = 1
# top-p 参数（控制多样性）
top_p = 0.95

[PROMPTS]
# 视频处理提示词
video_prompt = 详细描述视频内容。按照逗号分隔的中文提示词格式输出当前女角色的着装造型，姿势动作。

[FILTER]
# 过滤关键词，用逗号分隔
keywords = 隐私部位，私密部位，生殖器，下体，

[FILTER_WORDS]
# 当 AI 生成的提示词包含以下词汇时会重新生成，多个词汇用逗号分隔
words = 私处，隐私部位，私密部位，不符合，公序良俗，低俗，违规，道德，无法提供，blurry,low resolution,watermark,signature,text,logo,username,I cannot,
